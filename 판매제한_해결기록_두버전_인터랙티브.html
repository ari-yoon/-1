<script>
const data = {
  a: [],
  b: [{ date:"2026-01-08\n17:46:22", reason:"회피의도없음", content:"제주도로 배송비 변경 필요하여 거래 취소 확인", author:"BJm301_홍다인" }]
};

function check(id) {
  const sel = document.getElementById('sel-'+id).value;
  const inp = document.getElementById('inp-'+id).value.trim();
  const btn = document.getElementById('btn-'+id);
  const ok = sel && inp;
  btn.disabled = !ok;
  btn.style.background = ok ? '#3b82f6' : '#94a3b8';
  btn.style.cursor = ok ? 'pointer' : 'not-allowed';
}

function render(id) {
  const tbody = document.getElementById('tbody-'+id);
  const resolveBtn = document.getElementById('resolve-'+id);
  if (data[id].length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:24px 0;color:#9ca3af;font-size:12px;"><div style="font-size:22px;margin-bottom:4px;opacity:0.3;">📭</div>데이터 없음</td></tr>`;
    resolveBtn.textContent = '해결하기';
    resolveBtn.style.background = '#3b82f6';
    return;
  }
  let rows = data[id].map((r, i) => {
    const d = r.date.split('\n');
    return `<tr style="border-bottom:1px solid #f1f5f9;">
      <td style="padding:8px 10px;text-align:center;color:#6b7280;font-size:11px;line-height:1.5;">${d[0]}<br>${d[1]}</td>
      <td style="padding:8px 10px;text-align:center;color:#111827;font-size:12px;">${r.reason}</td>
      <td style="padding:8px 10px;color:#111827;font-size:12px;">${r.content}</td>
      <td style="padding:8px 10px;text-align:center;color:#6b7280;font-size:11px;">${r.author}</td>
      <td style="padding:8px 10px;text-align:center;"><button onclick="del('${id}',${i})" style="background:none;border:none;cursor:pointer;color:#9ca3af;font-size:13px;padding:0;">🗑</button></td>
    </tr>`;
  }).join('');
  rows += `<tr><td colspan="5" style="text-align:right;padding:4px 10px;">
    <span style="font-size:11px;color:#9ca3af;">◀</span>
    <span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;background:#3b82f6;color:#fff;font-size:11px;margin:0 3px;">1</span>
    <span style="font-size:11px;color:#9ca3af;">▶</span>
  </td></tr>`;
  tbody.innerHTML = rows;
  resolveBtn.textContent = '되돌리기';
  resolveBtn.style.background = '#ef4444';
}

function addRecord(id) {
  const reason = document.getElementById('sel-'+id).value;
  const memo = document.getElementById('inp-'+id).value.trim();
  if (!reason || !memo) return;
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}\n${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  data[id].push({ date: dateStr, reason, content: memo, author: '관리자' });
  document.getElementById('sel-'+id).value = '';
  document.getElementById('inp-'+id).value = '';
  check(id);
  render(id);
}

function del(id, i) {
  data[id].splice(i, 1);
  render(id);
}

render('a');
render('b');
</script>
